name: Bug Report
description: Report a bug in RblxDash
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: "When I click X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to /dashboard/players
        2. Click on a player
        3. See error in console
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of RblxDash is affected?
      options:
        - Dashboard
        - API (v1)
        - Webhooks
        - Authentication
        - Billing
        - Moderation
        - Analytics
        - Players
        - Servers
        - Settings
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: Which version or commit hash are you running?
      placeholder: "v0.1.0 or abc1234"

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node.js version, hosting platform
      placeholder: |
        - OS: Windows 11
        - Browser: Chrome 120
        - Node.js: 20.11
        - Hosting: Vercel

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots or console output.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't been reported
          required: true
        - label: I'm running the latest version from `main`
